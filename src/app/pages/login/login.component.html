<div class="login-wrapper">
  <div class="login-box">
    <h2>Acesso de Operador</h2>
    <p class="login-desc">
      Informe o ID gerado no cadastro (ex.: <strong>AX101</strong>) para abrir o dashboard industrial.
    </p>

    <input type="text" [(ngModel)]="operadorId" (keyup.enter)="entrar()" placeholder="ID do operador" class="form-input"
      autocomplete="username" autocapitalize="characters" spellcheck="false" />

    <button type="button" (click)="entrar()" class="btn-primary" [disabled]="carregando">
      {{ carregando ? 'Verificando...' : 'Entrar no Dashboard' }}
    </button>


    <button routerLink="/" class="btn-secondary">Voltar</button>

    <p class="login-footer">
      É administrador?
      <a routerLink="/admin">Acessar painel admin</a>
    </p>

    @if (errorMessage) {
    <p class="error-msg">{{ errorMessage }}</p>
    }

    <p class="text-termos"><a href="https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm" target="_blank">'Termos e Condições'
      </a>
    </p>

    <div class="lgpd-container">
      <label class="lgpd-opcao">
        <input type="checkbox" id="lgpd-termos" [(ngModel)]="termosAceitos" required>
        <span class="checkbox-custom"></span>
        <span class="label-texto">Sim. Li e concordo com os Termos e Condições *</span>
      </label>
    </div>
  </div>


</div>
